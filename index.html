<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Movies Archive</title>

  <!-- IRANSans (fontcdn.ir) -->
  <!-- <link href="https://cdn.fontcdn.ir/Font/Persian/IRANSans/IRANSans.css" rel="stylesheet" type="text/css" /> -->

  <!-- Bootstrap icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <!-- main stylesheet -->
  <link rel="stylesheet" href="style.css">

  <!-- supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- Header (sticky with blur) -->
<header class="main-header">
  <div class="search-bar">
    <button id="menuBtn" class="menu-btn" aria-label="menu"><i class="bi bi-list"></i></button>
    <input id="search" type="text" placeholder="جست‌وجوی فیلم‌ها..." />
    <button id="profileBtn" class="icon-inside" aria-label="profile"><i class="bi bi-person"></i></button>
  </div>
  <button id="themeToggle" class="icon-btn" aria-label="toggle theme"><i class="bi bi-moon"></i></button>
</header>

<!-- side menu and overlay -->
<div id="menuOverlay" class="menu-overlay"></div>
<nav id="sideMenu" class="side-menu" aria-hidden="true">
  <h3><i class="bi bi-house-door"></i> ژانرها</h3>
  <div id="genreGrid" class="genre-grid"></div>

  <div class="telegram-link">
    <i class="bi bi-telegram"></i>
    <a href="https://t.me/+k9x0azX1dFk4NWVk" target="_blank" rel="noopener">Telegram Channel</a>
  </div>
</nav>

<!-- main container -->
<div class="container">
  <!-- admin messages (bubbles above movies) -->
  <div id="adminMessages" class="messages-container" aria-live="polite"></div>

  <!-- movies count -->
  <div id="movieCount" class="movie-count">🎞️ تعداد فیلم‌ها: 0</div>

  <!-- movies grid -->
  <div id="moviesGrid" class="movies-grid" role="list"></div>

  <!-- pagination -->
  <div id="pagination" class="pagination-container" aria-label="pagination"></div>
</div>

<!-- login modal (hidden by default) -->
<div id="loginModal" class="login-modal" aria-hidden="true">
  <div class="login-box" role="dialog" aria-labelledby="loginTitle">
    <button id="closeLoginModal" class="close-btn" aria-label="close">&times;</button>
    <h2 id="loginTitle">Admin login</h2>
    <form id="loginForm" class="login-form" novalidate>
      <div class="input-group">
        <span class="icon"><i class="bi bi-person"></i></span>
        <input id="loginEmail" type="email" placeholder="Email" required />
      </div>
      <div class="input-group">
        <span class="icon"><i class="bi bi-lock"></i></span>
        <input id="loginPassword" type="password" placeholder="Password" required />
      </div>
      <button type="submit" class="login-btn">Log in</button>
      <div class="social-login">
      </div>
    </form>
  </div>
</div>

<!-- script (app logic) -->
<script src="script.js"></script>
</body>
</html>
