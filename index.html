<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 Movies Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- هدر -->
  <header class="main-header">
    <div class="search-bar">
      <button id="menuBtn" class="menu-btn" aria-label="menu">☰</button>
      <input type="text" id="search" placeholder="Search" oninput="renderMovies()">
      <button id="profileBtn" class="icon-inside">👤</button>
    </div>
    <button id="themeToggle" class="icon-btn">🌙</button>
  </header>

  <!-- منوی همبرگری -->
  <div id="menuOverlay" class="menu-overlay"></div>
  <nav id="sideMenu" class="side-menu">
    <h3>🎭 ژانرها</h3>
    <div id="genreGrid" class="genre-grid"></div>
    <div class="telegram-link" style="margin-top:16px; padding-top:10px; border-top:1px solid rgba(0,0,0,0.1); display:flex; align-items:center; gap:8px;">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="Telegram" width="24" height="24">
      <a href="https://t.me/+k9x0azX1dFk4NWVk" target="_blank" rel="noopener">telegram channel link</a>
    </div>
  </nav>

  <!-- محتوای اصلی -->
  <div class="container">
    <div id="movieCount">🎞️ تعداد فیلم‌ها: 0</div>
    <div id="moviesGrid" class="movies-grid"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
