<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 Movies Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn&display=swap" rel="stylesheet">
  <!-- فایل استایل -->
  <link rel="stylesheet" href="style.css">
  <!-- کتابخانه Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- هدر -->
  <header class="main-header">
    <div class="search-bar">
      <button id="menuBtn" class="icon-inside">&#9776;</button>
      <input type="text" id="search" placeholder="Search" oninput="renderMovies()">
      <button id="profileBtn" class="icon-inside">👤</button>
    </div>
    <button id="themeToggle" class="icon-btn">🌙</button>
  </header>

  <!-- منوی همبرگری -->
  <div id="menuOverlay" class="menu-overlay"></div>
  <nav id="sideMenu" class="side-menu">
    <h3>🎭 ژانرها</h3>
    <div id="genreGrid" class="genre-grid"></div>
  </nav>

  <!-- محتوای اصلی -->
  <div class="container">
    <div id="movieCount">🎞️ تعداد فیلم‌ها: 0</div>
    <div id="moviesGrid" class="movies-grid"></div>
  </div>

  <!-- پنل ادمین -->
  <section id="adminProfile" class="hidden">
    <h2>پنل ادمین</h2>
    <form id="addMovieForm">
      <input type="text" id="title" placeholder="Title" />
      <input type="file" id="coverFile" accept="image/*" />
      <input type="text" id="link" placeholder="File Link" />
      <textarea id="synopsis" placeholder="Synopsis"></textarea>
      <input type="text" id="director" placeholder="Director" />
      <input type="text" id="product" placeholder="Product" />
      <input type="text" id="stars" placeholder="Stars" />
      <input type="text" id="imdb" placeholder="IMDB" />
      <input type="text" id="release_info" placeholder="Release Info" />
      <input type="text" id="genre" placeholder="Genre" />
      <button type="submit">ثبت و ارسال</button>
    </form>
    <div id="movieList"></div>
  </section>

  <!-- فایل اسکریپت -->
  <script src="script.js"></script>
</body>
</html>
